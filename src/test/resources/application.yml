# =========================================
# 테스트 환경 설정 (H2 인메모리 DB)
# =========================================
# CI/CD 환경에서 MySQL/Redis 없이 테스트 가능하도록
# H2 인메모리 DB + Redis/캐시 비활성화

spring:
  datasource:
    # H2 인메모리 DB (MySQL 호환 모드)
    url: jdbc:h2:mem:testdb;MODE=MYSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      # 테스트 시 자동 스키마 생성 후 종료 시 삭제
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss
    time-zone: Asia/Seoul
  # CI 환경에서 Redis 없이 테스트 가능하도록 자동 설정 비활성화
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  cache:
    type: none
  # OAuth2 소셜 로그인 (SecurityConfig.oauth2FilterChain이 ClientRegistrationRepository 필요)
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-google-client-id
            client-secret: test-google-client-secret
            scope: email, profile
          kakao:
            client-id: test-kakao-client-id
            client-secret: test-kakao-client-secret
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-authentication-method: client_secret_post
            scope: profile_nickname, account_email
          naver:
            client-id: test-naver-client-id
            client-secret: test-naver-client-secret
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: name, email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

server:
  port: 0  # 랜덤 포트 (테스트 간 충돌 방지)

# ── 앱 설정 (코드에서 @Value("${app.jwt.*}") 등으로 참조) ──
app:
  jwt:
    secret: test-secret-key-must-be-at-least-256-bits-long-for-hmac-sha256-algorithm
    access-token-expiry: 3600000
    refresh-token-expiry: 604800000
  cookie:
    secure: false
  service:
    key: test-service-key
  oauth:
    redirect-url: http://localhost:5173/cookie
    failure-url: http://localhost:5173/login
  point:
    free-on-signup: 500
  # 등급별 AI 추천 쿼터 (@ConfigurationProperties QuotaProperties)
  quota:
    bronze:
      daily-limit: 3
      monthly-limit: 30
      free-daily: 0
      max-input-length: 200
    silver:
      daily-limit: 10
      monthly-limit: 200
      free-daily: 2
      max-input-length: 500
    gold:
      daily-limit: 30
      monthly-limit: 600
      free-daily: 5
      max-input-length: 1000
    platinum:
      daily-limit: -1
      monthly-limit: -1
      free-daily: 10
      max-input-length: 2000

# ── Toss Payments (테스트용 플레이스홀더) ──
toss:
  payments:
    secret-key: test_sk_placeholder
    client-key: test_ck_placeholder
    base-url: https://api.tosspayments.com/v1
    webhook-secret: ""

# ── CORS ──
cors:
  allowed-origins: http://localhost:3000
  allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true
  max-age: 3600

# AI Agent (테스트에서는 사용하지 않음)
ai:
  agent:
    base-url: http://localhost:9999
    service-key: test-key
    timeout: 5

# 추천 서비스 (테스트에서는 사용하지 않음)
recommend-service:
  base-url: http://localhost:9998

logging:
  level:
    root: WARN
