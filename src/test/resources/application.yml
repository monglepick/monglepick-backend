# =========================================
# 테스트 환경 설정 (H2 인메모리 DB)
# =========================================
# CI/CD 환경에서 MySQL 없이 테스트 가능하도록
# H2 인메모리 데이터베이스 사용

spring:
  # OAuth2 소셜 로그인 (테스트용 더미 자격증명 — ClientRegistrationRepository 빈 생성을 위해 필요)
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-google-client-id
            client-secret: test-google-client-secret
            scope: profile,email
          kakao:
            client-id: test-kakao-client-id
            client-secret: test-kakao-client-secret
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            client-authentication-method: client_secret_post
            scope: profile_nickname,account_email
          naver:
            client-id: test-naver-client-id
            client-secret: test-naver-client-secret
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/naver"
            scope: name,email
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
  datasource:
    # H2 인메모리 DB (MySQL 호환 모드)
    url: jdbc:h2:mem:testdb;MODE=MYSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      # 테스트 시 자동 스키마 생성 후 종료 시 삭제
      ddl-auto: create-drop
    # Spring Boot 2.5+: data.sql이 JPA 스키마 생성 이후 실행되도록 지연
    # 미설정 시 data.sql이 테이블 생성 전에 실행되어 INSERT 실패
    defer-datasource-initialization: true
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss
    time-zone: Asia/Seoul

server:
  port: 0  # 랜덤 포트 (테스트 간 충돌 방지)

# JWT + 앱 공통 설정 (JwtTokenProvider는 app.jwt.* 경로 사용)
app:
  jwt:
    secret: test-secret-key-must-be-at-least-256-bits-long-for-hmac-sha256-algorithm
    access-token-expiry: 3600000
    refresh-token-expiry: 604800000
  admin:
    email: admin@test.com
    password: Admin1234!
    nickname: 관리자
  # 등급별 쿼터 설정 (QuotaProperties — v3.3 6등급 팝콘 테마)
  quota:
    normal:
      daily-limit: 3
      monthly-limit: 10
      free-daily: 0
      max-input-length: 200
    bronze:
      daily-limit: 5
      monthly-limit: 30
      free-daily: 1
      max-input-length: 400
    silver:
      daily-limit: 7
      monthly-limit: 60
      free-daily: 2
      max-input-length: 500
    gold:
      daily-limit: 10
      monthly-limit: 80
      free-daily: 2
      max-input-length: 800
    platinum:
      daily-limit: 15
      monthly-limit: 120
      free-daily: 4
      max-input-length: 3000
    diamond:
      daily-limit: -1
      monthly-limit: -1
      free-daily: 4
      max-input-length: -1

# AI Agent (테스트에서는 사용하지 않음)
ai:
  agent:
    base-url: http://localhost:9999
    service-key: test-key
    timeout: 5

# 추천 서비스 (테스트에서는 사용하지 않음)
recommend-service:
  base-url: http://localhost:9998

# CORS
cors:
  allowed-origins: http://localhost:3000
  allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true
  max-age: 3600

# Toss Payments (테스트에서는 실제 호출 없음)
toss:
  payments:
    secret-key: test-toss-secret-key
    client-key: test-toss-client-key
    base-url: https://api.tosspayments.com/v1

logging:
  level:
    root: WARN
