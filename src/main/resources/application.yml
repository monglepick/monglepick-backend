## =============================================================================
## 몽글픽 백엔드 애플리케이션 설정
## =============================================================================
## Spring Boot 4.0.3 + JPA + MySQL 8.0
## DDL은 JPA 엔티티 기반 ddl-auto=update로 자동 관리 (init.sql 불필요)
## =============================================================================

spring:
  application:
    name: monglepick-backend

  ## -------------------------------------------------------------------------
  ## MySQL 데이터소스 설정
  ## -------------------------------------------------------------------------
  ## 환경변수로 오버라이드 가능:
  ##   SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/monglepick?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:monglepick}
    password: ${SPRING_DATASOURCE_PASSWORD:monglepick_dev}
    driver-class-name: com.mysql.cj.jdbc.Driver

    ## HikariCP 커넥션 풀 설정
    hikari:
      maximum-pool-size: 20          # 최대 커넥션 수
      minimum-idle: 5                # 최소 유휴 커넥션 수
      idle-timeout: 300000           # 유휴 커넥션 타임아웃 (5분)
      connection-timeout: 30000      # 커넥션 획득 대기 타임아웃 (30초)
      max-lifetime: 1800000          # 커넥션 최대 수명 (30분)

  ## ------------------------------------------------------------------------
  ## Spring Security OAuth2 Client 설정 (KMG 패턴)
  ## -------------------------------------------------------------------------
  ## Spring Security가 자동으로 OAuth2 흐름을 처리한다.
  ## /oauth2/authorization/{provider} → 제공자 리다이렉트
  ## /login/oauth2/code/{provider} → 콜백 처리
  security:
    oauth2:
      client:
        registration:
          naver:
            client-id: ${NAVER_CLIENT_ID:}
            client-secret: ${NAVER_CLIENT_SECRET:}
            redirect-uri: "{baseUrl}/login/oauth2/code/naver"
            authorization-grant-type: authorization_code
            scope: [name, email]
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            redirect-uri: "{baseUrl}/login/oauth2/code/google"
            authorization-grant-type: authorization_code
            scope: [profile, email]
          kakao:
            client-id: ${KAKAO_CLIENT_ID:}
            client-secret: ${KAKAO_CLIENT_SECRET:}
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope: [profile_nickname, account_email]
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

  ## -------------------------------------------------------------------------
  ## JPA / Hibernate 설정
  ## -------------------------------------------------------------------------
  jpa:
    ## DDL은 JPA 엔티티 기반 자동 관리 → update로 스키마 자동 생성/변경
    hibernate:
      ddl-auto: update
    ## Hibernate 초기화 후 data.sql 실행 (시드 데이터 적재)
    defer-datasource-initialization: true

  sql:
    init:
      ## C-7: 운영 환경에서 매번 data.sql을 실행하면 중복 삽입 위험이 있으므로
      ## 환경변수로 제어한다. 기본값 never, 개발 환경에서만 SQL_INIT_MODE=always 설정
      mode: ${SQL_INIT_MODE:never}

    ## Hibernate 속성
    properties:
      hibernate:
        ## MySQL 8.0 방언 (자동 감지되지만 명시적으로 지정)
        dialect: org.hibernate.dialect.MySQLDialect
        ## SQL 포맷팅 (개발 시 가독성 향상)
        format_sql: true
        ## 배치 INSERT/UPDATE 최적화
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

    ## 콘솔에 실행 SQL 출력 여부 (운영 환경에서는 false 권장)
    show-sql: false
    ## Open Session In View 비활성화 (성능 + LazyInitializationException 명시적 처리)
    open-in-view: false

## -------------------------------------------------------------------------
## Swagger/OpenAPI 설정
## -------------------------------------------------------------------------
## springdoc-openapi로 API 문서를 자동 생성한다.
## 접속: http://localhost:8080/swagger-ui/index.html
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true
  api-docs:
    path: /v3/api-docs
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

## -------------------------------------------------------------------------
## CORS 설정
## -------------------------------------------------------------------------
## 프론트엔드(monglepick-client)에서 백엔드 API 접근 허용
## 운영 환경에서는 CORS_ALLOWED_ORIGINS 환경변수로 오버라이드
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true
  max-age: 3600

## -------------------------------------------------------------------------
## 서버 설정
## -------------------------------------------------------------------------
server:
  port: ${SERVER_PORT:8080}
  servlet:
    encoding:
      charset: UTF-8
      force: true

## -------------------------------------------------------------------------
## 로깅 설정
## -------------------------------------------------------------------------
logging:
  level:
    root: INFO
    com.monglepick: DEBUG
    ## SQL 디버깅 시 아래 주석 해제
    # org.hibernate.SQL: DEBUG
    # org.hibernate.orm.jdbc.bind: TRACE

## -------------------------------------------------------------------------
## 앱 커스텀 설정
## -------------------------------------------------------------------------
## 서비스 키, 포인트 시스템, 등급별 일일/월간 이용 제한 등
## 환경변수로 오버라이드 가능: SERVICE_API_KEY, FREE_POINTS_ON_SIGNUP 등
app:
  service:
    ## ⚠ 운영 환경에서는 반드시 SERVICE_API_KEY 환경변수를 설정해야 합니다
    key: ${SERVICE_API_KEY:dev-service-key-change-me}
  point:
    free-on-signup: ${FREE_POINTS_ON_SIGNUP:500}
    cost-per-recommendation: ${POINT_COST_PER_RECOMMENDATION:100}
  quota:
    bronze:
      daily-limit: 3
      monthly-limit: 30
      free-daily: 0
      max-input-length: 200
    silver:
      daily-limit: 10
      monthly-limit: 200
      free-daily: 2
      max-input-length: 500
    gold:
      daily-limit: 30
      monthly-limit: 600
      free-daily: 5
      max-input-length: 1000
    platinum:
      daily-limit: -1
      monthly-limit: -1
      free-daily: 10
      max-input-length: 2000
  jwt:
    ## ⚠ 운영 환경에서는 반드시 JWT_SECRET 환경변수를 256비트 이상의 안전한 키로 설정해야 합니다
    secret: ${JWT_SECRET:monglepick-dev-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256}
    access-token-expiry: 3600000
    refresh-token-expiry: 604800000
  oauth:
    ## 소셜 로그인 성공/실패 시 프론트엔드 리다이렉트 URL
    redirect-url: ${OAUTH_REDIRECT_URL:http://localhost:5173/cookie}
    failure-url: ${OAUTH_FAILURE_URL:http://localhost:5173/login}
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
      token-uri: https://oauth2.googleapis.com/token
      userinfo-uri: https://www.googleapis.com/oauth2/v2/userinfo
    kakao:
      client-id: ${KAKAO_CLIENT_ID:}
      client-secret: ${KAKAO_CLIENT_SECRET:}
      token-uri: https://kauth.kakao.com/oauth/token
      userinfo-uri: https://kapi.kakao.com/v2/user/me
    naver:
      client-id: ${NAVER_CLIENT_ID:}
      client-secret: ${NAVER_CLIENT_SECRET:}
      token-uri: https://nid.naver.com/oauth2.0/token
      userinfo-uri: https://openapi.naver.com/v1/nid/me

## -------------------------------------------------------------------------
## Toss Payments 설정
## -------------------------------------------------------------------------
## Toss Payments PG 연동에 필요한 인증 키 및 API URL.
## - secret-key: 서버 전용 시크릿 키 (외부 노출 금지, Basic Auth에 사용)
## - client-key: 클라이언트 전용 키 (Toss JS SDK 결제창 호출에 사용, 노출 가능)
## - base-url: Toss Payments REST API 베이스 URL
## 운영 환경에서는 환경변수로 오버라이드: TOSS_SECRET_KEY, TOSS_CLIENT_KEY, TOSS_BASE_URL
toss:
  payments:
    ## ⚠ 운영 환경에서는 반드시 TOSS_SECRET_KEY, TOSS_CLIENT_KEY 환경변수를 설정해야 합니다
    secret-key: ${TOSS_SECRET_KEY:REPLACE_WITH_TOSS_SECRET_KEY}
    client-key: ${TOSS_CLIENT_KEY:REPLACE_WITH_TOSS_CLIENT_KEY}
    base-url: ${TOSS_BASE_URL:https://api.tosspayments.com/v1}
