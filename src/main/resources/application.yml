## =============================================================================
## 몽글픽 백엔드 애플리케이션 설정
## =============================================================================
## Spring Boot 4.0.3 + JPA + MySQL 8.0
## DDL은 init.sql로 관리하므로 ddl-auto=validate 사용 (JPA가 DDL 생성/변경하지 않음)
## =============================================================================

spring:
  application:
    name: monglepick-backend

  ## -------------------------------------------------------------------------
  ## MySQL 데이터소스 설정
  ## -------------------------------------------------------------------------
  ## 환경변수로 오버라이드 가능:
  ##   SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://10.50.26.166:3306/monglepick?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:monglepick}
    password: ${SPRING_DATASOURCE_PASSWORD:monglepick}
    driver-class-name: com.mysql.cj.jdbc.Driver

    ## HikariCP 커넥션 풀 설정
    hikari:
      maximum-pool-size: 20          # 최대 커넥션 수
      minimum-idle: 5                # 최소 유휴 커넥션 수
      idle-timeout: 300000           # 유휴 커넥션 타임아웃 (5분)
      connection-timeout: 30000      # 커넥션 획득 대기 타임아웃 (30초)
      max-lifetime: 1800000          # 커넥션 최대 수명 (30분)

  ## -------------------------------------------------------------------------
  ## JPA / Hibernate 설정
  ## -------------------------------------------------------------------------
  jpa:
    ## DDL은 init.sql로 직접 관리 → validate로 엔티티-테이블 매핑만 검증
    hibernate:
      ddl-auto: none

    ## Hibernate 속성
    properties:
      hibernate:
        ## MySQL 8.0 방언 (자동 감지되지만 명시적으로 지정)
        dialect: org.hibernate.dialect.MySQLDialect
        ## SQL 포맷팅 (개발 시 가독성 향상)
        format_sql: true
        ## 배치 INSERT/UPDATE 최적화
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

    ## 콘솔에 실행 SQL 출력 여부 (운영 환경에서는 false 권장)
    show-sql: false
    ## Open Session In View 비활성화 (성능 + LazyInitializationException 명시적 처리)
    open-in-view: false

## -------------------------------------------------------------------------
## CORS 설정
## -------------------------------------------------------------------------
## 프론트엔드(monglepick-client)에서 백엔드 API 접근 허용
## 운영 환경에서는 CORS_ALLOWED_ORIGINS 환경변수로 오버라이드
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true
  max-age: 3600

## -------------------------------------------------------------------------
## 서버 설정
## -------------------------------------------------------------------------
server:
  port: ${SERVER_PORT:8080}
  servlet:
    encoding:
      charset: UTF-8
      force: true

## -------------------------------------------------------------------------
## 로깅 설정
## -------------------------------------------------------------------------
logging:
  level:
    root: INFO
    com.monglepick: DEBUG
    ## SQL 디버깅 시 아래 주석 해제
    # org.hibernate.SQL: DEBUG
    # org.hibernate.orm.jdbc.bind: TRACE

## -------------------------------------------------------------------------
## 앱 커스텀 설정
## -------------------------------------------------------------------------
## 서비스 키, 포인트 시스템, 등급별 일일/월간 이용 제한 등
## 환경변수로 오버라이드 가능: SERVICE_API_KEY, FREE_POINTS_ON_SIGNUP 등
app:
  service:
    key: ${SERVICE_API_KEY:dev-service-key-change-me}
  point:
    free-on-signup: ${FREE_POINTS_ON_SIGNUP:500}
    cost-per-recommendation: ${POINT_COST_PER_RECOMMENDATION:100}
  quota:
    bronze:
      daily-limit: 3
      monthly-limit: 30
      free-daily: 0
      max-input-length: 200
    silver:
      daily-limit: 10
      monthly-limit: 200
      free-daily: 2
      max-input-length: 500
    gold:
      daily-limit: 30
      monthly-limit: 600
      free-daily: 5
      max-input-length: 1000
    platinum:
      daily-limit: -1
      monthly-limit: -1
      free-daily: 10
      max-input-length: 2000

## -------------------------------------------------------------------------
## Toss Payments 설정
## -------------------------------------------------------------------------
## Toss Payments PG 연동에 필요한 인증 키 및 API URL.
