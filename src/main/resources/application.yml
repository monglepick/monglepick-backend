## =============================================================================
## 몽글픽 백엔드 애플리케이션 설정
## =============================================================================
## Spring Boot 4.0.3 + JPA + MySQL 8.0
## DDL은 init.sql로 관리하므로 ddl-auto=validate 사용 (JPA가 DDL 생성/변경하지 않음)
## =============================================================================

spring:
  application:
    name: monglepick-backend
  ## :jdbc:mysql://localhost:3306/monglepick?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
  ## -------------------------------------------------------------------------
  ## MySQL 데이터소스 설정
  ## -------------------------------------------------------------------------
  ## 환경변수로 오버라이드 가능:
  ##   DB_URL, DB_USERNAME, DB_PASSWORD
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

    ## HikariCP 커넥션 풀 설정
    hikari:
      maximum-pool-size: 20          # 최대 커넥션 수
      minimum-idle: 5                # 최소 유휴 커넥션 수
      idle-timeout: 300000           # 유휴 커넥션 타임아웃 (5분)
      connection-timeout: 30000      # 커넥션 획득 대기 타임아웃 (30초)
      max-lifetime: 1800000          # 커넥션 최대 수명 (30분)

  ## -------------------------------------------------------------------------
  ## JPA / Hibernate 설정
  ## -------------------------------------------------------------------------
  jpa:
    ## DDL은 init.sql로 직접 관리 → validate로 엔티티-테이블 매핑만 검증
    hibernate:
      ddl-auto: none

    ## Hibernate 속성
    properties:
      hibernate:
        ## MySQL 8.0 방언 (자동 감지되지만 명시적으로 지정)
        dialect: org.hibernate.dialect.MySQLDialect
        ## MySQL BIT(1) → Java Boolean 매핑 (TINYINT로 처리)
        type:
          preferred_boolean_jdbc_type: INTEGER
        ## SQL 포맷팅 (개발 시 가독성 향상)
        format_sql: true
        ## 배치 INSERT/UPDATE 최적화
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

    ## 콘솔에 실행 SQL 출력 여부 (운영 환경에서는 false 권장)
    show-sql: false
    ## Open Session In View 비활성화 (성능 + LazyInitializationException 명시적 처리)
    open-in-view: false

  ## -------------------------------------------------------------------------
  ## OAuth2 소셜 로그인 설정 (Google/Kakao/Naver)
  ## -------------------------------------------------------------------------
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:placeholder}
            client-secret: ${GOOGLE_CLIENT_SECRET:placeholder}
            scope: email, profile
          kakao:
            client-id: ${KAKAO_CLIENT_ID:placeholder}
            client-secret: ${KAKAO_CLIENT_SECRET:placeholder}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-authentication-method: client_secret_post
            scope: profile_nickname, account_email
          naver:
            client-id: ${NAVER_CLIENT_ID:placeholder}
            client-secret: ${NAVER_CLIENT_SECRET:placeholder}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: name, email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

## -------------------------------------------------------------------------
## CORS 설정
## -------------------------------------------------------------------------
## 프론트엔드(monglepick-client)에서 백엔드 API 접근 허용
## 운영 환경에서는 CORS_ALLOWED_ORIGINS 환경변수로 오버라이드
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true
  max-age: 3600

## -------------------------------------------------------------------------
## 서버 설정
## -------------------------------------------------------------------------
server:
  port: ${SERVER_PORT:8080}
  servlet:
    encoding:
      charset: UTF-8
      force: true

## -------------------------------------------------------------------------
## 로깅 설정
## -------------------------------------------------------------------------
logging:
  level:
    root: INFO
    com.monglepick: DEBUG
    ## SQL 디버깅 시 아래 주석 해제
    # org.hibernate.SQL: DEBUG
    # org.hibernate.orm.jdbc.bind: TRACE

## ---------------------------------------------------------------------------
## 앱 설정 (JWT + 등급별 쿼터)
## ---------------------------------------------------------------------------
app:
  jwt:
    secret: ${JWT_SECRET:monglepick-dev-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256}
    access-token-expiry: ${JWT_ACCESS_EXPIRY:3600000}
    refresh-token-expiry: ${JWT_REFRESH_EXPIRY:604800000}

  ## -------------------------------------------------------------------------
  ## 쿠키 보안 설정
  ## -------------------------------------------------------------------------
  ## APP_COOKIE_SECURE=true 로 설정 시 HTTPS 전용 쿠키 활성화 (운영 환경 필수)
  ## 개발 환경(HTTP)에서는 false(기본값) 유지
  cookie:
    secure: ${APP_COOKIE_SECURE:false}

  ## 등급별 AI 추천 쿼터 (-1 = 무제한)
  quota:
    bronze:
      daily-limit: 3
      monthly-limit: 30
      free-daily: 0
      max-input-length: 200
    silver:
      daily-limit: 10
      monthly-limit: 200
      free-daily: 2
      max-input-length: 500
    gold:
      daily-limit: 30
      monthly-limit: 600
      free-daily: 5
      max-input-length: 1000
    platinum:
      daily-limit: -1
      monthly-limit: -1
      free-daily: 10
      max-input-length: 2000

## ---------------------------------------------------------------------------
## Swagger UI 접근 제어
## ---------------------------------------------------------------------------
## SWAGGER_ENABLED=false 설정 시 Swagger UI 및 OpenAPI 문서 완전 비활성화
## 로컬/스테이징: true (기본값), 운영: false 필수
springdoc:
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:true}
  api-docs:
    enabled: ${SWAGGER_ENABLED:true}

## ---------------------------------------------------------------------------
## 개발 전용 인증 설정 (Swagger UI 테스트용)
## ---------------------------------------------------------------------------
## DEV_AUTH_ENABLED=true 로 설정 시 /api/v1/dev/token 엔드포인트가 활성화되어
## Swagger UI에서 간편하게 JWT 토큰을 발급받아 API 테스트 가능
## ⚠ 운영 환경에서는 반드시 false(기본값)로 유지
dev:
  auth:
    enabled: ${DEV_AUTH_ENABLED:false}
  ## 마스터키: Swagger UI에서 Authorize → DevMasterKeyAuth에 이 값을 입력하면 ADMIN 인증 통과
  master-key: ${DEV_MASTER_KEY:monglepick-dev-master-2026}

## ---------------------------------------------------------------------------
## Toss Payments 설정
## ---------------------------------------------------------------------------
toss:
  payments:
    secret-key: ${TOSS_SECRET_KEY:test_sk_placeholder}
    client-key: ${TOSS_CLIENT_KEY:test_ck_placeholder}
    base-url: ${TOSS_BASE_URL:https://api.tosspayments.com/v1}
    webhook-secret: ${TOSS_WEBHOOK_SECRET:}
