## =============================================================================
## 몽글픽 백엔드 애플리케이션 설정
## =============================================================================
## Spring Boot 4.0.3 + JPA + MySQL 8.0
## DDL은 JPA 엔티티 기반 ddl-auto=update로 자동 관리 (init.sql 불필요)
## =============================================================================

spring:
  application:
    name: monglepick-backend
  ## Jackson JSON 직렬화 — LocalDateTime/Instant 응답을 KST 기준으로 직렬화 (QA #162)
  ## JVM TZ (user.timezone) 와 함께 동작하며, Docker 컨테이너는 TZ=Asia/Seoul 환경변수로 JVM 을 맞춘다.
  jackson:
    time-zone: Asia/Seoul
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  ## -------------------------------------------------------------------------
  ## MySQL 데이터소스 설정
  ## -------------------------------------------------------------------------
  ## 환경변수로 오버라이드 가능:
  ##   SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

    ## HikariCP 커넥션 풀 설정
    hikari:
      maximum-pool-size: 20          # 최대 커넥션 수
      minimum-idle: 5                # 최소 유휴 커넥션 수
      idle-timeout: 300000           # 유휴 커넥션 타임아웃 (5분)
      connection-timeout: 30000      # 커넥션 획득 대기 타임아웃 (30초)
      max-lifetime: 1800000          # 커넥션 최대 수명 (30분)

  ## ------------------------------------------------------------------------
  ## Spring Security OAuth2 Client 설정 (KMG 패턴)
  ## -------------------------------------------------------------------------
  ## Spring Security가 자동으로 OAuth2 흐름을 처리한다.
  ## /oauth2/authorization/{provider} → 제공자 리다이렉트
  ## /login/oauth2/code/{provider} → 콜백 처리
  security:
    oauth2:
      client:
        registration:
          naver:
            client-id: ${NAVER_CLIENT_ID:}
            client-secret: ${NAVER_CLIENT_SECRET:}
            redirect-uri: "{baseUrl}/login/oauth2/code/naver"
            authorization-grant-type: authorization_code
            scope: [name, email]
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            redirect-uri: "{baseUrl}/login/oauth2/code/google"
            authorization-grant-type: authorization_code
            scope: [profile, email]
          kakao:
            client-id: ${KAKAO_CLIENT_ID:}
            client-secret: ${KAKAO_CLIENT_SECRET:}
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope: [profile_nickname, account_email]
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

  ## -------------------------------------------------------------------------
  ## JPA / Hibernate 설정
  ## -------------------------------------------------------------------------
  jpa:
    ## DDL은 JPA 엔티티 기반 자동 관리 → update로 스키마 자동 생성/변경
    hibernate:
      ddl-auto: update
    ## Hibernate 초기화 후 data.sql 실행 (시드 데이터 적재)
    defer-datasource-initialization: true
    ## Hibernate 속성 — spring.jpa.properties.hibernate.* 경로에 위치해야 적용됨
    properties:
      hibernate:
        ## MySQL 8.0 방언은 Hibernate가 자동 감지 — 명시 지정 시 HHH90000025 경고 발생하므로 제거
        ## SQL 포맷팅 (개발 시 가독성 향상)
        format_sql: true
        ## 배치 INSERT/UPDATE 최적화
        ## QA #162: jdbc.time_zone 을 Asia/Seoul 로 지정하면 Hibernate 가 TIMESTAMP/DATETIME 바인딩 시 KST 를 사용한다.
        ## MySQL 서버 자체는 UTC 로 두고 JVM/앱 레이어에서 KST 로 변환하는 것을 권장하지만,
        ## 현재 운영 DB 는 KST 로 설정되어 있으므로 JVM/Hibernate 도 맞춰 일관성 확보.
        jdbc:
          batch_size: 50
          time_zone: Asia/Seoul
        order_inserts: true
        order_updates: true
    ## 콘솔에 실행 SQL 출력 여부 (운영 환경에서는 false 권장)
    show-sql: ${JPA_SHOW_SQL:false}
    ## Open Session In View 비활성화 (성능 + LazyInitializationException 명시적 처리)
    open-in-view: false

  sql:
    init:
      ## C-7: 운영 환경에서 매번 data.sql을 실행하면 중복 삽입 위험이 있으므로
      ## 환경변수로 제어한다. 기본값 never, 개발 환경에서만 SQL_INIT_MODE=always 설정
      mode: ${SQL_INIT_MODE:never}

## -------------------------------------------------------------------------
## Dev Auth (개발 전용 간편 인증)
## -------------------------------------------------------------------------
## Swagger UI에서 Authorize → DevMasterKeyAuth에 마스터키 입력 시 모든 API 인증 통과.
## 로컬 개발 환경에서는 기본 활성화 (true), 운영 환경에서는 DEV_AUTH_ENABLED=false 환경변수로 비활성화.
## ⚠ 운영 배포 시 반드시 DEV_AUTH_ENABLED=false 설정 필수 (docker-compose.prod.app.yml 에 이미 설정됨)
dev:
  auth:
    enabled: ${DEV_AUTH_ENABLED:true}
  master-key: ${DEV_MASTER_KEY:monglepick-dev-master-2026}

## -------------------------------------------------------------------------
## Swagger/OpenAPI 설정
## -------------------------------------------------------------------------
## springdoc-openapi로 API 문서를 자동 생성한다.
## 접속: http://localhost:8080/swagger-ui/index.html
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true
  api-docs:
    path: /v3/api-docs
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

## -------------------------------------------------------------------------
## CORS 설정
## -------------------------------------------------------------------------
## 프론트엔드(monglepick-client)에서 백엔드 API 접근 허용
## 운영 환경에서는 CORS_ALLOWED_ORIGINS 환경변수로 오버라이드
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true
  max-age: 3600

## -------------------------------------------------------------------------
## 서버 설정
## -------------------------------------------------------------------------
server:
  port: ${SERVER_PORT:8080}
  servlet:
    encoding:
      charset: UTF-8
      force: true

## -------------------------------------------------------------------------
## Actuator / Micrometer Prometheus 설정
## -------------------------------------------------------------------------
## Prometheus(10.20.0.12)가 /actuator/prometheus 를 스크레이프한다.
## 의존성: `io.micrometer:micrometer-registry-prometheus` (build.gradle:44)
## 노출 엔드포인트: health(details: always), info, prometheus, metrics
## SecurityConfig 에서 `/actuator/**` 는 이미 permitAll 처리되어 있다.
## 태그: 모든 메트릭에 application=monglepick-backend, env=${SPRING_PROFILES_ACTIVE} 라벨 부여.
## 히스토그램: http.server.requests 에 대해 SLO bucket 활성화하여 Grafana p50/p95/p99 관측.
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    prometheus:
      access: unrestricted
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      env: ${SPRING_PROFILES_ACTIVE:default}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
      slo:
        http.server.requests: 50ms, 100ms, 200ms, 500ms, 1s, 2s

## -------------------------------------------------------------------------
## P6Spy 데이터소스 데코레이터 설정
## -------------------------------------------------------------------------
## com.github.gavlyukovskiy:p6spy-spring-boot-starter 가 자동으로 DataSource 를
## P6SpyDataSource 로 래핑하여 모든 JDBC 호출(JPA + MyBatis)을 인터셉트한다.
## 로그 메시지 포맷은 {@link com.monglepick.monglepickbackend.global.config.P6SpyConfig}
## 가 Hibernate BasicFormatterImpl 기반으로 직접 등록한다 (log-format 옵션은 무시됨).
##
## 운영 환경에서는 P6SPY_LOGGING=false 로 비활성화 권장 (성능 영향 + 로그 폭증).
decorator:
  datasource:
    p6spy:
      enable-logging: ${P6SPY_LOGGING:true}
      ## SLF4J 로거(p6spy)로 출력 → 아래 logging.level.p6spy 로 레벨 제어
      logging: slf4j
      ## 멀티라인 SQL 출력 (P6SpyConfig 가 직접 포맷하므로 fallback 용)
      multiline: true

## -------------------------------------------------------------------------
## 로깅 설정
## -------------------------------------------------------------------------
logging:
  level:
    root: INFO
    com.monglepick: DEBUG
    ## P6Spy SQL 로그 (P6SpyConfig 가 Hibernate 포맷터로 정리한 SQL 출력)
    ## 운영에서 끄려면 P6SPY_LOG_LEVEL=OFF 또는 위 P6SPY_LOGGING=false
    p6spy: ${P6SPY_LOG_LEVEL:INFO}
    ## Hibernate SQL 로깅 (실행 SQL + 바인드 파라미터)
    ## 환경변수로 제어: HIBERNATE_SQL_LOG=DEBUG, HIBERNATE_BIND_LOG=TRACE
    ## P6Spy와 중복될 수 있으므로 P6Spy OFF 시 활성화 권장
    org.hibernate.SQL: ${HIBERNATE_SQL_LOG:DEBUG}
    org.hibernate.orm.jdbc.bind: ${HIBERNATE_BIND_LOG:TRACE}


##------------------------
##이미지 업로드
##------------------------

## -------------------------------------------------------------------------
## 앱 커스텀 설정
## -------------------------------------------------------------------------
## 서비스 키, 포인트 시스템, 등급별 일일/월간 이용 제한 등
## 환경변수로 오버라이드 가능: SERVICE_API_KEY, FREE_POINTS_ON_SIGNUP 등
app:
  upload:
    # 로컬: ./uploads (기본값)
    # 서버 배포 시 .env에서 UPLOAD_DIR=/home/ubuntu/data 로 오버라이드
    dir: ${UPLOAD_DIR:./uploads}

    # 로컬: http://localhost:8080/images (Spring Boot가 직접 서빙)
    # 서버 배포 시 .env에서 UPLOAD_URL_PREFIX=http://210.109.15.187/images 로 오버라이드
    # 서버에서는 NGINX가 /images/** 를 /home/ubuntu/data/ 로 서빙
    url-prefix: ${UPLOAD_URL_PREFIX:http://localhost:8080/images}

  ## 관리자 시드 계정 (DataInitializer가 기동 시 1회 생성, 멱등)
  ## 환경변수(.env) 미설정 시 의도적으로 기동 실패하여 누락 방지
  admin:
    email: ${ADMIN_EMAIL}
    password: ${ADMIN_PASSWORD}
    nickname: ${ADMIN_NICKNAME}
    ## 관리자 시드 계정 세부 역할 — 2026-04-09 P2-⑫ RBAC 추가
    ## 허용값: SUPER_ADMIN / ADMIN / MODERATOR / FINANCE_ADMIN / SUPPORT_ADMIN / DATA_ADMIN / AI_OPS_ADMIN
    ## 생략 시 SUPER_ADMIN (시드 계정은 관리자 계정 관리 권한까지 보유해야 초기 운영 가능)
    ## 허용되지 않은 값이 들어오면 DataInitializer 가 SUPER_ADMIN 으로 fallback 하고 warning 로그
    role: ${ADMIN_ROLE:SUPER_ADMIN}
  service:
    ## ⚠ 운영 환경에서는 반드시 SERVICE_API_KEY 환경변수를 설정해야 합니다
    key: ${SERVICE_API_KEY:dev-service-key-change-me}
  ## 쿠키 Secure 플래그 — HttpOnly 쿠키 공통 정책
  ## 개발(HTTP): false / 운영(HTTPS): APP_COOKIE_SECURE=true
  cookie:
    secure: ${APP_COOKIE_SECURE:false}
  ## -----------------------------------------------------------------------
  point:
    free-on-signup: ${FREE_POINTS_ON_SIGNUP:500}
    cost-per-recommendation: ${POINT_COST_PER_RECOMMENDATION:100}
  ## AI 리뷰 검증 에이전트 (도장깨기 리뷰 → 시청 인증) 파라미터 — 2026-04-14 신규
  ## - threshold: 에이전트 aiConfidence 가 이 값 이상이면 AUTO_VERIFIED 로 자동 승인 (그 외 NEEDS_REVIEW)
  ## - 관리자 화면 상단 KPI 카드에 현재 임계값을 표시해 운영자가 언제든 확인 가능
  ai:
    review-verification:
      threshold: ${AI_REVIEW_VERIFICATION_THRESHOLD:0.7}
  agent:
    base-url: ${AGENT_BASE_URL:http://localhost:8000}
  ## 등급별 쿼터 (v3.2 6등급 체계, 팝콘 테마)
  ## - daily-limit  : 일일 무료 AI 한도 (-1=무제한)
  ## - monthly-limit: AI 이용권(쿠폰) 월간 한도 (-1=무제한). v3.2 역할 분리
  ## - free-daily   : 매일 자동 지급 무료 이용권 횟수 (v3.2 신규)
  ## - max-input-length: 최대 입력 글자수 (-1=무제한)
  quota:
    normal:        ## 알갱이 (가입 기본, 0~999P)
      daily-limit: 3
      monthly-limit: 10
      free-daily: 0
      max-input-length: 200
    bronze:        ## 강냉이 (1,000~3,999P)
      daily-limit: 5
      monthly-limit: 30
      free-daily: 1
      max-input-length: 400
    silver:        ## 팝콘 (4,000~6,499P, basic 구독 즉시 보장)
      daily-limit: 7
      monthly-limit: 60
      free-daily: 2
      max-input-length: 500
    gold:          ## 카라멜팝콘 (6,500~9,999P)
      daily-limit: 10
      monthly-limit: 80
      free-daily: 2
      max-input-length: 800
    platinum:      ## 몽글팝콘 (10,000~19,999P, premium 구독 즉시 보장)
      daily-limit: 15
      monthly-limit: 120
      free-daily: 4
      max-input-length: 3000
    diamond:       ## 몽아일체 (20,000P+, 무제한)
      daily-limit: -1
      monthly-limit: -1
      free-daily: 4
      max-input-length: -1
  jwt:
    ## ⚠ 운영 환경에서는 반드시 JWT_SECRET 환경변수를 256비트 이상의 안전한 키로 설정해야 합니다
    secret: ${JWT_SECRET:monglepick-dev-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256}
    access-token-expiry: 3600000
    refresh-token-expiry: 604800000
  oauth:
    ## 소셜 로그인 성공/실패 시 프론트엔드 리다이렉트 URL
    redirect-url: ${OAUTH_REDIRECT_URL:http://localhost:5173/cookie}
    failure-url: ${OAUTH_FAILURE_URL:http://localhost:5173/login}
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
      token-uri: https://oauth2.googleapis.com/token
      userinfo-uri: https://www.googleapis.com/oauth2/v2/userinfo
    kakao:
      client-id: ${KAKAO_CLIENT_ID:}
      client-secret: ${KAKAO_CLIENT_SECRET:}
      token-uri: https://kauth.kakao.com/oauth/token
      userinfo-uri: https://kapi.kakao.com/v2/user/me
    naver:
      client-id: ${NAVER_CLIENT_ID:}
      client-secret: ${NAVER_CLIENT_SECRET:}
      token-uri: https://nid.naver.com/oauth2.0/token
      userinfo-uri: https://openapi.naver.com/v1/nid/me

## -------------------------------------------------------------------------
## 게스트(비로그인) 평생 1회 무료 체험 — 쿠키 HMAC 시크릿
## -------------------------------------------------------------------------
## GuestQuotaService 가 mongle_guest 쿠키 서명/검증에 사용.
## ⚠ 운영 환경에서는 반드시 GUEST_COOKIE_SECRET 환경변수를 설정해야 합니다
##   (기본값 사용 시 GuestQuotaService 기동 로그에 warning 출력)
mongle:
  guest:
    cookie-secret: ${GUEST_COOKIE_SECRET:dev-guest-cookie-secret-change-me}


## -------------------------------------------------------------------------
## OCR 서버 설정 (monglepick-recommend FastAPI)
## -------------------------------------------------------------------------
ocr:
  server:
    url: ${OCR_SERVER_URL:http://localhost:8001}

## -------------------------------------------------------------------------
## Toss Payments 설정
## -------------------------------------------------------------------------
## Toss Payments PG 연동에 필요한 인증 키 및 API URL.
## - secret-key: 서버 전용 시크릿 키 (외부 노출 금지, Basic Auth에 사용)
## - client-key: 클라이언트 전용 키 (Toss JS SDK 결제창 호출에 사용, 노출 가능)
## - base-url: Toss Payments REST API 베이스 URL
## - webhook-secret: 웹훅 서명 검증용 HMAC-SHA256 시크릿 (운영 환경 필수)
##                   미설정 시 검증이 비활성화되어 위변조된 웹훅을 차단할 수 없으므로,
##                   운영 환경에서는 반드시 환경변수로 설정해야 한다.
## 운영 환경에서는 환경변수로 오버라이드: TOSS_SECRET_KEY, TOSS_CLIENT_KEY, TOSS_BASE_URL, TOSS_WEBHOOK_SECRET
toss:
  payments:
    ## ⚠ 운영 환경에서는 반드시 TOSS_SECRET_KEY, TOSS_CLIENT_KEY 환경변수를 설정해야 합니다
    secret-key: ${TOSS_SECRET_KEY:REPLACE_WITH_TOSS_SECRET_KEY}
    client-key: ${TOSS_CLIENT_KEY:REPLACE_WITH_TOSS_CLIENT_KEY}
    base-url: ${TOSS_BASE_URL:https://api.tosspayments.com/v1}
    ## ⚠ 운영 환경 필수 — 빈 문자열이면 웹훅 서명 검증이 비활성화된다 (Phase 9)
    webhook-secret: ${TOSS_WEBHOOK_SECRET:}


